            - develop/hpc-intro.qmd 
            - develop/hpc-jobs.qmd
            - develop/hpc-programming.qmd
        - section: "Data management"
          contents: 
            - develop/hpc-data_transfer.qmd
            - develop/hpc-ssh_keys.qmd
        - section: "Quizzes"
          contents:
            - develop/exercise_launch.qmd
