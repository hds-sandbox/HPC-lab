                - workshop/pipes-ex-envs-pixi.qmd
                - workshop/pipes-ex-envs-containers.qmd
                - workshop/pipes-ex-envs-cont-docker.qmd
                - workshop/pipes-ex-smk.qmd
            - section: "Day 2"
